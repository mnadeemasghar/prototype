<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Screen Index — Alsultania CRM Blueprint QA</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

      ['14','Revenue Adjustments','revenue-recording.html','Phase 2','Full mockup'],

      ['33','System Settings','system-settings.html','Phase 3','Full mockup'],
    ];
    document.getElementById('list').innerHTML = screens.map((row) => {
      const [n,t,f,p,fid='Wireframe'] = row;
      return `<tr><td>${n}</td><td><a href="${f}">${t}</a></td><td>${f}</td><td>${p}</td><td>${fid}</td></tr>`;
    }).join('');

  <script src="nav.js"></script>
</body>
</html>
